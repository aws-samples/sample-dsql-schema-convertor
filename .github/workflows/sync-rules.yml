name: Sync DSQL Converter Rules

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9am UTC
  workflow_dispatch:       # Manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/sync-rules.mjs
          echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check if changes were made
        id: check
        run: |
          if git diff --quiet src/converter.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests on updated rules
        if: steps.check.outputs.changed == 'true'
        id: test
        run: node scripts/test-converter.mjs

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true' && steps.test.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-dsql-rules
          delete-branch: true
          title: "Auto-sync: update converter rules from latest DSQL docs"
          body: |
            ## Automated Rule Sync

            The scheduled sync detected changes in Aurora DSQL's supported features.
            Converter rules have been updated to match the latest documentation.

            ### Changes

            ${{ steps.sync.outputs.summary || 'See diff below for details.' }}

            ### Safeguards passed

            - [x] Claude analysis completed
            - [x] Diff size within bounds (<50% change)
            - [x] Core export preserved
            - [x] All converter tests passed

            ---
            *This PR was auto-generated by the weekly rules sync workflow.*
            *Review the diff, then merge to deploy updated rules.*
          labels: automated,dsql-rules

      - name: Open issue on failure
        if: steps.check.outputs.changed == 'true' && steps.test.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "⚠️ Auto-sync: converter tests failed after rule update"
          content: |
            The scheduled DSQL rules sync generated an update, but the test suite failed.

            This means Claude's suggested changes would break existing conversions.
            Manual review is required.

            **Action:** Check the latest run of the "Sync DSQL Converter Rules" workflow.
          labels: bug,automated
